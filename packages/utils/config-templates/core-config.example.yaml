configVersion: 2

basePrompt: "You are Lilac."

tools:
  web:
    extract:
      providers: [tavily]
    fetch:
      mode: auto
  inspect:
    # Must start with google/.
    model: google/gemini-3.5-flash
  editFile:
    hashline: true
  output:
    maxPreviewBytes: 40KiB
    artifactTtl: 7d
    artifactMaxBytesPerSession: 50MiB
  historicalResultPruning:
    enabled: false
    protectTokens: 40000
    minimumTokens: 20000
  batch:
    maxCalls: 8
  media:
    maxInlineBytesPerPart: 10MiB
    maxInlineBytesTotal: 20MiB

plugins:
  disabled: []
  config: {}

workflows:
  # Global admission cap across queued, running, blocked, and paused workflow runs.
  maxActiveRuns: 64

# WARN: This is an experimental feature, use at your own risk. Config, DB schema, and behavior may change.
conversation:
  thread:
    summarization:
      # Enable the background thread summarization worker. The hidden
      # conversation.thread.runSummarization tool can still be called manually.
      enabled: false
      # Model used to summarize threads. Accepts main, fast, a models.def alias,
      # or a direct provider/model ref.
      model: fast
      # Number of threads to summarize concurrently inside one run.
      concurrency: 1
      # Include MEMORY.md, USER.md, and optional ENTITIES.md as background-only
      # context for disambiguation during summarization.
      includePromptContext: false
    embedding:
      # Enable semantic thread embeddings. Summaries and lexical search still work
      # when this is disabled or when embedding generation fails.
      enabled: false
      # Provider/model ref or models.def alias for an AI SDK embedding model.
      model: openai/text-embedding-3-small
    autoInject:
      # Enable automatic injection of related thread title metadata before answers
      # to long, meaningful user messages.
      enabled: false
      # Optional model used to plan automatic thread search queries. When unset,
      # inherits conversation.thread.summarization.model. Accepts main, fast,
      # a models.def alias, or a direct provider/model ref.
      plannerModel: fast
      # Minimum authored text mass after removing URLs, Discord syntax, punctuation,
      # and discounting code blocks. 80 is a moderate Discord default.
      minTextUnits: 80
      # Higher threshold after this conversation already received auto-injected
      # thread metadata. This avoids re-searching for same-topic follow-ups.
      followUpMinTextUnits: 110
      # Max thread titles to inject.
      limit: 3
      # Minimum final search score after semantic/lexical ranking and aboutness
      # coverage. Use 0 for broad/debug recall.
      minScore: 0.1
      # Search mode for auto-injected metadata: hybrid, semantic, or lexical.
      mode: hybrid
      # Only inject threads containing at least one user visible in the composed
      # request/reply-chain context.
      filterCurrentParticipants: false

surface:
  # Router behavior is surface-wide (not per-adapter).
  router:
    # Routing modes:
    # - mention: only start a request on mention/reply-to-bot (default for guild channels)
    # - active: treat the channel like a DM (respond to everything)
    defaultMode: mention

    # Per-session routing mode overrides. Key is the session/channel id.
    # Reserved internal keys: "__heartbeat__" (canonical) and "heartbeat" (alias)
    # target the autonomous heartbeat lane.
    sessionModes: {}
    # sessionModes:
    #   "123456789012345678":
    #     # Optional: when omitted, this session inherits defaultMode.
    #     mode: active
    #     # Optional: use restricted mode for public/untrusted channels.
    #     # Restricted mode runs bash in an overlay filesystem: writes outside
    #     # /tmp are discarded after the request, while /tmp persists at
    #     # /tmp/lilac-restricted/<sessionId>.
    #     safetyMode: restricted
    #     # Optional: override the global activeGate.enabled for this channel.
    #     gate: false
    #     # Optional: override the request model for this session.
    #     # Accepts an alias from models.def or provider/model.
    #     model: "sonnet"
    #     # Optional: additional session memo entries appended to system prompt.
    #     # Entries can be literal text or file:// URLs.
    #     additionalPrompts:
    #       - "Keep replies concise for this session."
    #       - "file:///abs/path/to/session-memo.md"
    #   "__heartbeat__":
    #     # Optional: override the internal heartbeat lane model.
    #     # The convenience alias "heartbeat" is also accepted.
    #     model: "sonnet"

    # Debounce window (ms) for active mode initial prompt batching.
    activeDebounceMs: 3000

    # Active channel gate to prevent replying to everything.
    # When enabled, we run a lightweight model-based gate before forwarding.
    activeGate:
      enabled: false
      timeoutMs: 2500

  discord:
    tokenEnv: "DISCORD_TOKEN"

    # If both lists are empty, the bot will ignore all Discord traffic.
    allowedChannelIds: []
    allowedGuildIds: []

    # Display name used in attribution + mention stripping. Must not contain spaces.
    botName: "lilac"

    # Optional: override surface DB location (default: <dataDir>/discord-surface.db).
    # dbPath: "/path/to/discord-surface.db"

    # Optional: Discord custom presence/status message.
    # statusMessage: "ready"

    # Optional: enable Discord member presence intent.
    # memberPresence: false

    # Discord output rendering mode:
    # - inline: stream directly in the final reply embed (legacy behavior)
    # - preview: stream a transient preview window, then post a full final reply and
    #   delete the preview window
    outputMode: preview

    # Final reply style used after preview mode finishes:
    # - embed: repost the final answer as embed(s)
    # - plain: repost the final answer as normal Discord text message(s)
    # Only applies when outputMode is preview.
    outputPreviewModeFinalStyle: plain

    # Global override for Discord notifications on output messages.
    # - true: allow reply ping + @user mentions to notify
    # - false: suppress notifications by default
    outputNotification: true

    # Streaming embed title phrases for in-progress updates.
    # A random entry is selected and rotated periodically while the request is running.
    # Defaults live in packages/utils/discord-working-indicators.ts.
    # workingIndicators: []

    # Discord-only markdown output features.
    markdownTableRender:
      # Convert markdown tables into fixed-width codeblock tables.
      enabled: true
      # Rendering style for generated codeblock tables: unicode | ascii.
      style: unicode
      # Max rendered table width (display cells, not bytes).
      maxWidth: 50
      # Fallback when a table cannot fit maxWidth:
      # - list: render a wrapped row/key-value list in a text codeblock
      # - passthrough: keep original markdown table unchanged
      fallbackMode: list

  heartbeat:
    # Enable the internal autonomous heartbeat lane.
    enabled: false
    # Optional heartbeat model override lives under:
    # surface.router.sessionModes."__heartbeat__".model
    # The alias key "heartbeat" is also accepted.
    # Optional default output destination for proactive heartbeat messages.
    # Format: <client>/<sessionIdOrAlias>, for example: discord/ops
    # defaultOutputSession: "discord/ops"
    # When heartbeat gets a chance to think (5-field minute-precision cron).
    cron: "*/30 * * * *"
    # Suppress heartbeat for this long after any non-heartbeat request activity.
    quietAfterActivityMs: 300000
    # Retry suppressed wakes after this delay.
    retryBusyMs: 60000
    # Optional quiet-hours hint for heartbeat instructions only.
    # softQuietHours:
    #   start: "23:00"
    #   end: "08:00"
    #   timezone: "Asia/Taipei"

agent:
  # Optional: include token/model timing stats in final response metadata.
  # - false: disable stats metadata on response events
  # - true: enable concise stats line ([M], [T], [TTFT], [TPS])
  # - { verbose: true }: also include input composition ([IC] ...)
  statsForNerds: false

  # Discord-only streaming thinking display lane.
  # - none: hide reasoning lane content
  # - simple: show only the working title + elapsed request timer
  # - detailed: also show blockquoted reasoning content (clamped to 500 chars)
  reasoningDisplay: detailed

  # Stop a primary agent run after this long without model, tool, or subagent activity.
  # Active runs may continue indefinitely.
  idleTimeoutMs: 900000

  retry:
    # Retry transient upstream failures such as overloaded/503/rate-limit stream errors.
    enabled: true
    maxRetries: 3
    baseDelayMs: 2000
    maxDelayMs: 30000

  subagents:
    # Master switch for delegate-style subagents.
    enabled: true
    # Max delegation depth (primary=0). Default 2 allows self->(explore|general)
    # while explore/general remain non-delegating by policy.
    maxDepth: 2
    # Stop a subagent after this long without model or tool activity.
    idleTimeoutMs: 360000
    # Optional free-form guidance appended to the parent-visible
    # subagent_delegate tool description. Use this for model-routing policy,
    # escalation rules, cost guidance, or workflow-specific preferences.
    # delegatePromptOverlay: |
    #   Prefer inexpensive models for mechanical exploration.
    #   Escalate difficult architecture and review work to a stronger model.
    profiles:
      explore:
        modelSlot: main
        # Profile behavior applies identically to direct and workflow launches.
        level1:
          tools: [read_file, glob, grep, fuzzy_search, batch]
          plugins: [builtin-local-tools]
        level2:
          callables: [fetch, search, skills.list, skills.brief, skills.full, content.inspect, discovery.search, conversation.thread.search, surface.help, surface.sessions.listParticipants, surface.messages.list, surface.messages.read, surface.messages.search, surface.reactions.list, surface.reactions.listDetailed]
          plugins: [web, skills, content.inspect, discovery, conversation.thread, surface]
        # Behavioral/tool-surface settings; these do not sandbox trusted Bash.
        network: true
        workspaceWrites: false
        execution: false
        delegation: false
        # Optional direct model override. Can be provider/model or an alias from models.def.
        # model: "openrouter/openai/gpt-4o"
        # Optional portable reasoning override for this subagent profile.
        # reasoning: low
        # options:
        #   temperature: 0.0
        # Optional extra prompt fragment appended in explore mode.
        # promptOverlay: |
        #   Focus on codebase mapping, cite concrete file paths, and avoid edits.
      general:
        modelSlot: main
        # "*" includes every globally enabled built-in or external contribution.
        level1: { tools: ["*"], plugins: ["*"] }
        level2: { callables: ["*"], plugins: ["*"] }
        network: true
        workspaceWrites: true
        execution: true
        delegation: false
        # model: "openrouter/openai/gpt-4o"
        # reasoning: medium
        # options:
        #   temperature: 0.1
        # Optional extra prompt fragment appended in general mode.
        # promptOverlay: |
        #   Prioritize execution over discussion and report concrete outcomes.
      self:
        modelSlot: main
        level1: { tools: ["*"], plugins: ["*"] }
        level2: { callables: ["*"], plugins: ["*"] }
        network: true
        workspaceWrites: true
        execution: true
        delegation: true
        # Self subagent is an isolated fork of the primary agent prompt/tooling.
        # model: "openrouter/openai/gpt-4o"
        # reasoning: high
        # options:
        #   temperature: 0.2
        # Optional extra prompt fragment appended in self mode.
        # promptOverlay: |
        #   Assume no prior conversation context; restate assumptions briefly.

# Optional: extra system prompt text prepended to data/prompts/*.
# basePrompt: |
#   You are lilac.

models:
  # Optional preset registry to make model selection ergonomic.
  def: {}
  # def:
  #   gpt-5.5:
  #     model: openai/gpt-5.5
  #     # Optional guidance shown to agents selecting a subagent model.
  #     comment: "Strong default for bounded coding and mechanical work."
  #     # Explicitly allow dynamic selection by subagent_delegate. Defaults to
  #     # false; static profiles, model slots, and human overrides are unaffected.
  #     agentCanSelect: true
  #     # Portable AI SDK reasoning effort:
  #     # provider-default | none | minimal | low | medium | high | xhigh
  #     reasoning: high
  #     # Provider-specific options are still supported and take precedence for
  #     # exact provider-native reasoning controls.
  #     options:
  #       reasoningEffort: high
  # def:
  #   opus:
  #     model: vercel/anthropic/claude-opus-4.8
  #     comment: "Use for architecture, difficult debugging, and critical review."
  #     reasoning: high
  #     options:
  #       anthropic:
  #         thinking:
  #           # newer Anthropic models use type: "adaptive" and display: "summarized"
  #           type: adaptive
  #           display: summarized
  #           budgetTokens: 12000
  #       gateway:
  #         order: [anthropic, vertex, bedrock]
  # def:
  #   sonnet:
  #     model: "openrouter/anthropic/claude-sonnet-4.5"
  #     options:
  #       # Opt in to Anthropic cache-control injection for the system prompt and
  #       # latest user message. Disabled by default because cache writes can
  #       # increase cost and are often ineffective with tool-result pruning.
  #       anthropic_prompt_cache: true
  #       anthropic:
  #         thinking:
  #           type: enabled
  #       gateway:
  #         order: [anthropic, vertex, bedrock]

  main:
    # Can be either a full spec (provider/model) or an alias from models.def.
    model: "openrouter/openai/gpt-4o"
    # Optional portable AI SDK reasoning effort.
    # reasoning: provider-default
    # For non-official OpenAI-compatible upstreams, use:
    # model: "openai-compatible/your-model-id"
    # options:
    #   temperature: 0.2
    #   # For direct openai/codex providers, append commentary/final_answer
    #   # channel guidance to the end of the system prompt.
    #   response_commentary: true
    #   # For openai/codex providers, parallelToolCalls defaults to true.
    #   # Set false to force sequential provider-side tool calling.
    #   openai:
    #     parallelToolCalls: false
    #   # openai-compatible provider options use the openaiCompatible namespace.
    #   openaiCompatible:
    #     temperature: 0.2

  # Fast/cheap model for lightweight features (router gate, etc.)
  fast:
    model: "openrouter/openai/gpt-4o-mini"
    # Optional: disable reasoning for lightweight gate/router work.
    # reasoning: none
    # options:
    #   temperature: 0.0

  capability:
    # Providers to always treat as unresolved when querying models.dev.
    # This keeps runtime behavior predictable for providers with unstable metadata.
    forceUnknownProviders: ["openai-compatible"]

    # Optional manual capability overrides keyed by provider/model spec.
    # Useful when models.dev lags behind newly released models.
    overrides: {}
    # overrides:
    #   # Derive a new model capability from an existing upstream model.
    #   "openai-compatible/my-new-model":
    #     inherit: "openai/gpt-4o-mini"
    #     limit:
    #       context: 262144
    #
    #   # Full manual override (no inherit): limit.context is required.
    #   "custom/private-model":
    #     limit:
    #       context: 131072
    #       output: 8192
    #     cost:
    #       input: 0.6
    #       output: 2.4
    #     modalities:
    #       input: [text, image, pdf]
    #       output: [text]
    #     attachment: true
    #
    #   # Inherited override with an explicit over-200k pricing tier patch.
    #   # Note: this only affects cost estimation; limit.context remains what
    #   # you set here (or inherit from models.dev).
    #   "vercel/anthropic/claude-opus-4.6":
    #     inherit: "vercel/anthropic/claude-opus-4.6"
    #     cost:
    #       context_over_200k:
    #         input: 10
    #         output: 37.5
    #         cache_read: 1
    #         cache_write: 12.5

# Entity aliasing / mention rewriting (Discord only).
#
# This powers two conveniences:
# - outbound: "@Stanley" -> "<@123>" and "#ops" -> "<#456>"
# - inbound: "<@123>" -> "@Stanley" and "<#456>" -> "#ops"
#
# Notes:
# - Matches are case-insensitive; the canonical casing is preserved from config.
# - Tokens are sanitized (whitespace -> '_' and leading @/# stripped).
# - Optional comments are injected into the system prompt alongside alias + raw id.
entity:
  users: {}
  sessions:
    discord: {}
# entity:
#   users:
#     Stanley:
#       discord: "123456789012345678"
#       comment: "Primary operator"
#
#   sessions:
#     discord:
#       ops:
#         discord: "234567890123456789"
#         comment: "Deploy coordination"
#       general: "345678901234567890"
