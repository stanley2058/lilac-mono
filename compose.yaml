services:
  lilac:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-ubuntu:24.04}
        NODE_MAJOR: ${NODE_MAJOR:-22}
        CONTAINER_UID: ${CONTAINER_UID:-1000}
        LILAC_BUILD_VERSION: ${LILAC_BUILD_VERSION:-dev}
        LILAC_BUILD_COMMIT: ${LILAC_BUILD_COMMIT:-dev}
        LILAC_BUILD_DIRTY: ${LILAC_BUILD_DIRTY:-false}
        LILAC_BUILD_AT: ${LILAC_BUILD_AT:-}
    image: lilac:dev
    depends_on:
      redis:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Opt-in: enable ANSI colors for logger output.
      # FORCE_COLOR: "1"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      LL_TOOL_SERVER_PORT: ${LL_TOOL_SERVER_PORT:-8080}
      DATA_DIR: ${DATA_DIR:-/data}
      LILAC_WORKSPACE_DIR: ${LILAC_WORKSPACE_DIR:-/data/workspace}
      GIT_CONFIG_GLOBAL: ${GIT_CONFIG_GLOBAL:-/data/.gitconfig}
      GNUPGHOME: ${GNUPGHOME:-/data/secret/gnupg}
      # Persist global installs into the mounted data directory.
      BUN_INSTALL_GLOBAL_DIR: ${BUN_INSTALL_GLOBAL_DIR:-/data/.bun/install/global}
      BUN_INSTALL_BIN: ${BUN_INSTALL_BIN:-/data/bin}
      BUN_INSTALL_CACHE_DIR: ${BUN_INSTALL_CACHE_DIR:-/data/.bun/install/cache}
      NPM_CONFIG_PREFIX: ${NPM_CONFIG_PREFIX:-/data/.npm-global}
      XDG_CONFIG_HOME: ${LILAC_XDG_CONFIG_HOME:-/data/.config}
      container: docker
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      - ./home/agents:/home/lilac/.agents
      - ./home/.ssh:/home/lilac/.ssh
    # Docker 28+ provides a writable view of only this container's private
    # cgroup namespace. No host cgroup bind or privileged mode is needed.
    cgroup: private
    tmpfs:
      - /run:rw,nosuid,nodev,mode=755,size=64m
      - /run/lock:rw,nosuid,nodev,mode=755,size=16m
      - /tmp:rw,nosuid,nodev,mode=1777,size=1g
    security_opt:
      # Nested bwrap needs unshare/clone, and systemd needs its private cgroup
      # hierarchy writable so it can delegate workflow memory/PID controllers.
      - seccomp=unconfined
      - apparmor=unconfined
      - writable-cgroups=true
      # Required while the workflow bwrap command mounts a private /proc.
      - systempaths=unconfined
    mem_limit: ${LILAC_CONTAINER_MEMORY_LIMIT:-4g}
    pids_limit: ${LILAC_CONTAINER_PIDS_LIMIT:-1024}
    stop_signal: SIGRTMIN+3
    stop_grace_period: 30s
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --connect-timeout 1 --max-time 4 -fsS http://127.0.0.1:${LL_TOOL_SERVER_PORT:-8080}/readyz >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  redis-data:
