name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant:
          - tag: catalinna
            container_user: Catalinna
            container_uid: 3000
          - tag: claudia
            container_user: Claudia
            container_uid: 3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false  # ref/ submodules not needed for build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.variant.tag }}
            type=raw,value=latest,enable=${{ matrix.variant.tag == 'catalinna' }}
            type=sha,prefix=${{ matrix.variant.tag }}-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            CONTAINER_USER=${{ matrix.variant.container_user }}
            CONTAINER_UID=${{ matrix.variant.container_uid }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
